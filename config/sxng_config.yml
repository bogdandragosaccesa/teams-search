# sxng_config.yml — SearXNG search engine config
# NOTE: secret_key and rate-limit/bypass flags are supplied via environment
# (see docker-compose.yml + .env.example). Do NOT hardcode a production secret here.
# Self-hosted private instance: disable the rate limiter / bot detection
# (internal container-to-container traffic would otherwise be blocked).
limiter: false

general:
  debug: false
  instance_name: "teams-search"
  default_lang: en
  locale: "en-US"

search:
  languages: all
  # safe_search: 0 = off, 1 = moderate, 2 = strict. Set 1+ for shared instances.
  safe_search: 0
  # No engines override -> SearXNG uses its built-in default engine set.
  formats:
    - html
    - json

server:
  port: 8080
  method: GET
  # Secret is injected via SEARXNG_SECRET_KEY (compose -> environment).
  # A random value is required in production; the env default is for local dev only.
  secret_key: "${SEARXNG_SECRET_KEY:teamssearch-dev-secret}"
