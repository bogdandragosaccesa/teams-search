# nginx.conf — Reverse proxy for SearXNG backend
#
# This config sits in front of the SearXNG container and forwards all
# incoming HTTP requests (on port 80 inside container = port 8082 on host) to:
#   upstream searxng_backend (searxng container, port 8080)
#
# The key proxy headers ensure SearXNG can extract the real client IP from X-Real-IP
# and X-Forwarded-For. Combined with the limiter.toml trusted_proxies=["0.0.0.0/0"],
# every request is considered to come from a "trusted" proxy — no 403 bot block.

upstream searxng_backend {
    server searxng:8080;   # Docker internal service name → container IP
}

server {
    listen 80;                  # Nginx listens on port 80 (mapped to host 8082 via docker-compose)

    # ── Proxy headers ───────────────────────────────────────────────────────
    # X-Real-IP: the original client's IP address. This is what SearXNG reads
    # and checks against trusted_proxies in limiter.toml. Since 0.0.0.0/0 is
    # always trusted, this header alone prevents any 403 from the blocklist.
    proxy_set_header X-Real-IP $remote_addr;

    # X-Forwarded-For: full chain of proxy IPs. Also checked against
    # trusted_proxies and must be present for SearXNG to correctly identify
    # the originating client network.
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # X-Forwarded-Proto: tells SearXNG what protocol the client used (http vs https).
    # Required in case we ever add SSL offloading / a TLS terminator.
    proxy_set_header X-Forwarded-Proto $scheme;

    # Host: preserve the original Host header from the client request.
    # SearXNG uses this for building correct URLs in search result links.
    proxy_set_header Host $host;

    # ── Backend passthrough ────────────────────────────────────────────────
    location / {
        proxy_pass http://searxng_backend;

        # Buffering: set low limits so large responses don't buffer.
        client_max_body_size 2m;
        chunked_transfer_encoding on;

        # Add security headers (best-effort, non-breaking).
        add_header X-Content-Type-Options "nosniff" always;
    }
}
